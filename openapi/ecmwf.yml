openapi: '3.1.0'
info:
  title: ECMWF Weather Forecast API
  description: >-
    Hourly weather forecast from ECMWF IFS and AIFS models.
  version: '1.0'
  contact:
    name: Open-Meteo
    url: https://open-meteo.com
    email: info@open-meteo.com
  license:
    name: Attribution 4.0 International (CC BY 4.0)
    url: https://creativecommons.org/licenses/by/4.0/
  termsOfService: https://open-meteo.com/en/features#terms
paths:
  /v1/ecmwf:
    servers:
      - url: https://api.open-meteo.com
    get:
      tags:
        - Weather Forecast APIs
      summary: ECMWF Weather Forecast API
      description: >-
        Hourly weather forecast from ECMWF IFS and AIFS models.
      parameters:
        - name: latitude
          in: query
          required: true
          description: >-
            Geographical WGS84 coordinates. Multiple coordinates can be comma separated.
          schema:
            type: string
        - name: longitude
          in: query
          required: true
          schema:
            type: string
        - name: hourly
          in: query
          description: >-
            A list of weather variables which should be returned.
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - temperature_2m
                - temperature_2m_min
                - temperature_2m_max
                - relative_humidity_2m
                - dew_point_2m
                - apparent_temperature
                - precipitation
                - rain
                - showers
                - snowfall
                - snowfall_water_equivalent
                - snow_depth
                - snow_depth_water_equivalent
                - weather_code
                - pressure_msl
                - surface_pressure
                - surface_temperature
                - cloud_cover
                - cloud_cover_low
                - cloud_cover_mid
                - cloud_cover_high
                - et0_fao_evapotranspiration
                - vapour_pressure_deficit
                - wind_speed_10m
                - wind_speed_100m
                - wind_speed_200m
                - wind_direction_10m
                - wind_direction_100m
                - wind_direction_200m
                - wind_gusts_10m
                - cape
                - convective_inhibition
                - total_column_integrated_water_vapour
                - soil_temperature_0_to_7cm
                - soil_temperature_7_to_28cm
                - soil_temperature_28_to_100cm
                - soil_temperature_100_to_255cm
                - soil_moisture_0_to_7cm
                - soil_moisture_7_to_28cm
                - soil_moisture_28_to_100cm
                - soil_moisture_100_to_255cm
                - runoff
                - precipitation_type
                - is_day
                - sunshine_duration
                - wet_bulb_temperature_2m
                - lightning_density
                - boundary_layer_height
                - roughness_length
                - albedo
                - k_index
                - sea_level_height_msl
                - sea_ice_thickness
                - sea_water_salinity
                - sea_surface_temperature
                - ocean_current_velocity
                - ocean_current_direction
                - shortwave_radiation
                - direct_radiation
                - diffuse_radiation
                - direct_normal_irradiance
                - global_tilted_irradiance
                - terrestrial_radiation
                - shortwave_radiation_instant
                - direct_radiation_instant
                - diffuse_radiation_instant
                - direct_normal_irradiance_instant
                - global_tilted_irradiance_instant
                - terrestrial_radiation_instant
                - temperature_1000hPa
                - temperature_925hPa
                - temperature_850hPa
                - temperature_700hPa
                - temperature_600hPa
                - temperature_500hPa
                - temperature_400hPa
                - temperature_300hPa
                - temperature_250hPa
                - temperature_200hPa
                - temperature_150hPa
                - temperature_100hPa
                - temperature_50hPa
                - temperature_10hPa
                - relative_humidity_1000hPa
                - relative_humidity_925hPa
                - relative_humidity_850hPa
                - relative_humidity_700hPa
                - relative_humidity_600hPa
                - relative_humidity_500hPa
                - relative_humidity_400hPa
                - relative_humidity_300hPa
                - relative_humidity_250hPa
                - relative_humidity_200hPa
                - relative_humidity_150hPa
                - relative_humidity_100hPa
                - relative_humidity_50hPa
                - relative_humidity_10hPa
                - cloud_cover_1000hPa
                - cloud_cover_925hPa
                - cloud_cover_850hPa
                - cloud_cover_700hPa
                - cloud_cover_600hPa
                - cloud_cover_500hPa
                - cloud_cover_400hPa
                - cloud_cover_300hPa
                - cloud_cover_250hPa
                - cloud_cover_200hPa
                - cloud_cover_150hPa
                - cloud_cover_100hPa
                - cloud_cover_50hPa
                - cloud_cover_10hPa
                - wind_speed_1000hPa
                - wind_speed_925hPa
                - wind_speed_850hPa
                - wind_speed_700hPa
                - wind_speed_600hPa
                - wind_speed_500hPa
                - wind_speed_400hPa
                - wind_speed_300hPa
                - wind_speed_250hPa
                - wind_speed_200hPa
                - wind_speed_150hPa
                - wind_speed_100hPa
                - wind_speed_50hPa
                - wind_speed_10hPa
                - wind_direction_1000hPa
                - wind_direction_925hPa
                - wind_direction_850hPa
                - wind_direction_700hPa
                - wind_direction_600hPa
                - wind_direction_500hPa
                - wind_direction_400hPa
                - wind_direction_300hPa
                - wind_direction_250hPa
                - wind_direction_200hPa
                - wind_direction_150hPa
                - wind_direction_100hPa
                - wind_direction_50hPa
                - wind_direction_10hPa
                - vertical_velocity_1000hPa
                - vertical_velocity_925hPa
                - vertical_velocity_850hPa
                - vertical_velocity_700hPa
                - vertical_velocity_600hPa
                - vertical_velocity_500hPa
                - vertical_velocity_400hPa
                - vertical_velocity_300hPa
                - vertical_velocity_250hPa
                - vertical_velocity_200hPa
                - vertical_velocity_150hPa
                - vertical_velocity_100hPa
                - vertical_velocity_50hPa
                - vertical_velocity_10hPa
                - geopotential_height_1000hPa
                - geopotential_height_925hPa
                - geopotential_height_850hPa
                - geopotential_height_700hPa
                - geopotential_height_600hPa
                - geopotential_height_500hPa
                - geopotential_height_400hPa
                - geopotential_height_300hPa
                - geopotential_height_250hPa
                - geopotential_height_200hPa
                - geopotential_height_150hPa
                - geopotential_height_100hPa
                - geopotential_height_50hPa
                - geopotential_height_10hPa
        - name: elevation
          in: query
          schema:
            type: number
            format: float
        - name: temperature_unit
          in: query
          schema:
            type: string
            default: celsius
            enum: [celsius, fahrenheit]
        - name: wind_speed_unit
          in: query
          schema:
            type: string
            default: kmh
            enum: [kmh, ms, mph, kn]
        - name: precipitation_unit
          in: query
          schema:
            type: string
            default: mm
            enum: [mm, inch]
        - name: timeformat
          in: query
          description: >-
            If format unixtime is selected, all time values are returned in UNIX epoch time.
          schema:
            type: string
            default: iso8601
            enum: [iso8601, unixtime]
        - name: timezone
          in: query
          description: >-
            Any IANA time zone name is supported. Use auto to resolve the local time zone.
          schema:
            type: string
        - name: past_days
          in: query
          description: >-
            Return past days of data.
          schema:
            type: integer
            default: 0
            minimum: 0
            maximum: 92
        - name: forecast_days
          in: query
          description: >-
            Number of forecast days.
          schema:
            type: integer
            default: 7
            minimum: 0
            maximum: 16
        - name: past_hours
          in: query
          schema:
            type: integer
        - name: forecast_hours
          in: query
          schema:
            type: integer
        - name: start_date
          in: query
          description: >-
            Start date of the time interval in ISO 8601 format.
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: >-
            End date of the time interval in ISO 8601 format.
          schema:
            type: string
            format: date
        - name: tilt
          in: query
          description: >-
            Slope tilt in degrees for global_tilted_irradiance calculation.
          schema:
            type: number
            format: float
            default: 0
        - name: azimuth
          in: query
          description: >-
            Azimuth for global_tilted_irradiance. North=0, East=90, South=180, West=270.
          schema:
            type: number
            format: float
            default: 0
        - name: cell_selection
          in: query
          description: >-
            Grid cell selection preference: land, sea, or nearest.
          schema:
            type: string
            enum: [land, sea, nearest]
        - name: apikey
          in: query
          description: >-
            Only required for commercial subscriptions.
          schema:
            type: string
        - name: models
          in: query
          description: Manually select one or more weather models.
          explode: false
          schema:
            type: array
            items:
              type: string
              enum:
                - ecmwf_ifs04
                - ecmwf_ifs025
                - ecmwf_aifs025
                - ecmwf_ifs_analysis
                - ecmwf_ifs_analysis_long_window
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    format: float
                  longitude:
                    type: number
                    format: float
                  elevation:
                    type: number
                    format: float
                  generationtime_ms:
                    type: number
                    format: float
                  utc_offset_seconds:
                    type: integer
                  timezone:
                    type: string
                  timezone_abbreviation:
                    type: string
                  hourly:
                    type: object
                  hourly_units:
                    type: object
                    additionalProperties:
                      type: string
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                  reason:
                    type: string

                      relative_humidity_2m_max:
                        type: array
                        items:
                          type: number
                          format: float
                      relative_humidity_2m_mean:
                        type: array
                        items:
                          type: number
                          format: float
                      wind_speed_10m_mean:
                        type: array
                        items:
                          type: number
                          format: float
                      wind_speed_10m_max:
                        type: array
                        items:
                          type: number
                          format: float
                      wind_gusts_10m_mean:
                        type: array
                        items:
                          type: number
                          format: float
                      wind_gusts_10m_max:
                        type: array
                        items:
                          type: number
                          format: float
                      soil_moisture_0_to_10cm_mean:

                - ecmwf_seasonal_seamless
                - ecmwf_seas5
                - ecmwf_ec46
                - ecmwf_seasonal_ensemble_mean_seamless
                - ecmwf_seas5_ensemble_mean
                - ecmwf_ec46_ensemble_mean
        - name: apikey
          in: query
          description: >-
            Only required for commercial subscriptions.
          schema:
            type: string
